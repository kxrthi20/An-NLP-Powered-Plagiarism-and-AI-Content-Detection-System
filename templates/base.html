<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plagiarism & AI Content Detector</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a2e; color: #fff; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: #16213e; padding: 30px; border-radius: 12px; box-shadow: 0px 4px 15px rgba(0,0,0,0.3); }
        
        /* Typography adjustments per request */
        h1 { color: #00adb5; font-weight: bold; text-shadow: none; font-size: 2.2rem; margin-bottom: 5px; }
        h1 strong { font-weight: 900; }
        nav { margin-bottom: 30px; border-bottom: 2px solid #555; padding-bottom: 10px; }
        nav a { color: #fff; padding: 10px 15px; text-decoration: none; font-weight: bold; margin: 0 5px; border-radius: 5px; }
        nav a:hover, nav a.active { background-color: #e94560; }
        
        /* Common Element Styles */
        .input-group { display: flex; justify-content: space-between; gap: 20px; margin-bottom: 20px; text-align: left;}
        .input-box { flex: 1; }
        textarea { width: 100%; height: 180px; background: #0f3460; color: #fff; border: 1px solid #e94560; padding: 10px; border-radius: 8px; font-family: inherit; }
        input[type="file"] { margin-top: 10px; }
        button { background-color: #e94560; color: white; padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; margin: 10px; transition: 0.3s;}
        button:hover { background-color: #d6334f; }
        
        /* Result Elements */
        .result-box { margin-top: 30px; padding: 20px; border-radius: 8px; background: #0f3460; border: 2px solid #555; }
        .bar-bg { width: 100%; background: #ddd; border-radius: 10px; height: 25px; margin: 10px 0; overflow: hidden; }
        .bar-fill { height: 100%; transition: width 0.5s ease-in-out; }
        .red { background-color: #ff4b4b; border-color: #ff4b4b; }
        .orange { background-color: #fd7e14; border-color: #fd7e14; }
        .green { background-color: #28a745; border-color: #28a745; }
        .stats { font-size: 14px; color: #aaa; margin-top: 10px;}
        
        /* Info Page Elements */
        .info-section { text-align: left; background: #0f3460; padding: 20px; border-radius: 8px; margin-bottom: 20px; border-left: 5px solid #00adb5;}
        .info-section h3 { margin-top: 0; color: #e94560; }
    </style>
</head>
<body>
    <div class="container">
        <h1><strong>Plagiarism & AI Content Detector</strong></h1>
        <p style="color: #aaa; font-style: italic; margin-bottom: 25px;">Analyze document similarities and detect AI probabilities.</p>
        
        <nav>
            <a href="/">Plagiarism Checker</a>
            <a href="/ai">AI Detector</a>
        </nav>

        {% block content %}{% endblock %}
    </div>
</body>
</html>
